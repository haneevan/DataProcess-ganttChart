<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>作業日報管理システム</title>
</head>
<body>

<div class="navbar">
  <button class="nav-btn" id="btn-back" onclick="goBack()" disabled>← 戻る</button>
  <h1>作業日報管理システム</h1>
  <span class="breadcrumb" id="breadcrumb">ホーム</span>
  <div style="display: flex; gap: 8px; align-items: center;">
    <button class="nav-btn" id="btn-settings" onclick="showSettings()">⚙️ 設定</button>
    <button class="nav-btn" id="btn-fwd" onclick="goSummary()" disabled>まとめ →</button>
  </div>
</div>

<div class="screen active" id="screen-home">
  <div class="home-wrap">
    <div class="home-card">
      <h2>📋 データ選択</h2>
      <div class="field-group">
        <label>日付</label>
        <input type="date" id="dateInput">
      </div>
      <div class="field-group">
        <label>作業者名</label>
        <select id="opSelect">
          <option value="">-- 読み込み中... --</option>
        </select>
      </div>
      <button class="btn-primary" onclick="showGantt()">ガントチャートを表示 →</button>
      <p class="home-hint">data/ フォルダ内の CSV ファイルから自動検出</p>
    </div>

    <div class="op-panel">
      <h3>
        <span>👤 作業者一覧</span>
        <span id="op-count" style="font-size:12px; color:#888; font-weight:normal;"></span>
      </h3>
      <input type="text" id="opSearchInput" class="op-search" placeholder="作業者名で検索..." oninput="filterOperatorDirectory()">
      <div class="op-list" id="opDirectoryList">
        <div style="padding:16px; color:#999; font-size:13px; text-align:center;">読み込み中...</div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screen-gantt">
  <div id="gantt-wrapper">
    <div style="padding:40px;color:#999;font-size:15px;">⏳ 読み込み中...</div>
  </div>
</div>

<div class="screen" id="screen-summary">
  <div class="sum-wrap">
    <div class="sum-header">
      <h2 id="sum-title">作業まとめ</h2>
      <p id="sum-sub"></p>
    </div>
    <div class="sum-grid">
      <div class="sum-panel">
        <h3>作業別 時間内訳</h3>
        <div id="pie-container"></div>
        <p></p>
        <div id="bar-container"></div>
      </div>
      <div class="sum-panel">
        <h3>合計時間テーブル</h3>
        <table class="act-table">
          <thead>
            <tr><th>作業内容</th><th>合計時間</th><th>割合</th></tr>
          </thead>
          <tbody id="sum-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="screen-settings">
  <div class="sum-wrap" style="max-width: 800px; margin: 0 auto;">
    <div class="sum-header">
      <h2>⚙️ 項目設定 (Activity Configuration)</h2>
      <p style="color: gray; font-size: 13px; margin-top: 4px;">
        ※ AndroidアプリのCSVから未登録の項目を検出すると、自動的に「灰色」でここに登録されます。
      </p>
    </div>
    
    <div class="sum-panel" style="margin-top: 15px;">
      <table class="act-table" id="activities-table">
        <thead>
          <tr>
            <th style="text-align: left; padding-left: 15px;">業務項目名 (Activity Item)</th>
            <th style="text-align: center; width: 150px;">表示カラー (Color)</th>
            <th style="text-align: center; width: 100px;">操作 (Actions)</th> </tr>
        </thead>
        <tbody id="activities-list-body">
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
